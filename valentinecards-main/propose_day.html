<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propose Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital@1&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #7f1d1d 0%, #000000 100%);
            font-family: 'Lora', serif;
            color: #fee2e2;
            overflow: hidden;
            touch-action: none;
        }
        .glass-card {
            background: rgba(80, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(254, 202, 202, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .typewriter {
            min-height: 8rem;
        }
        .pulse-heart { animation: heartBeat 1.5s infinite; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div class="glass-card p-8 rounded-2xl w-full max-w-md text-center relative overflow-hidden">
        <!-- Background Hearts -->
        <div class="absolute inset-0 pointer-events-none opacity-20">
            <span class="absolute top-5 left-5 text-3xl animate-pulse">❤️</span>
            <span class="absolute bottom-5 right-5 text-3xl animate-pulse delay-700">❤️</span>
        </div>

        <h1 class="text-5xl font-[Dancing_Script] text-red-400 mb-6 drop-shadow-lg">Will You be Mine?</h1>
        
        <div id="poem" class="text-lg italic leading-relaxed text-gray-200 typewriter mb-8"></div>

        <div class="flex flex-col gap-4 items-center w-full relative h-32 justify-center">
            <button id="yesBtn" onclick="acceptProposal()" class="w-full py-4 bg-gradient-to-r from-red-600 to-red-800 text-white rounded-xl text-xl font-bold shadow-lg shadow-red-900/50 pulse-heart transition-all duration-300 z-20">
                Yes, Forever 💍
            </button>
            <!-- No button positioned absolutely relative to container -->
            <button id="noBtn" class="px-6 py-2 bg-gray-800/80 text-gray-400 rounded-lg text-sm absolute bottom-0 transition-all duration-100 ease-out">
                No
            </button>
        </div>
    </div>

    <script>
        // Typewriter
        const poemText = "In a chaotic world,\nyou are my peace.\nMy hand fits in yours\nlike a missing piece.";
        const poemEl = document.getElementById('poem');
        let i = 0;

        function typeWriter() {
            if (i < poemText.length) {
                poemEl.innerHTML += poemText.charAt(i) === '\n' ? '<br>' : poemText.charAt(i);
                i++;
                setTimeout(typeWriter, 60);
            }
        }
        setTimeout(typeWriter, 500);

        // Mobile-friendly Interaction
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        let count = 0;
        const snarkyTexts = ["Ouch.", "Try again", "Missed!", "Seriously?", "Nope!", "Pls?"];

        function runAway() {
            const container = document.querySelector('.glass-card');
            const rect = container.getBoundingClientRect();
            
            // Constrain movement within the card
            const maxX = rect.width - noBtn.offsetWidth - 40; // 40px buffer
            const maxY = 100; // Keep it somewhat near the bottom area
            
            const x = Math.random() * maxX - (maxX/2);
            const y = (Math.random() - 0.5) * maxY; // Move up/down slightly

            noBtn.style.transform = `translate(${x}px, ${y - 50}px)`; // -50 moves it up a bit
            noBtn.innerText = snarkyTexts[count % snarkyTexts.length];
            
            count++;
            yesBtn.style.transform = `scale(${1 + count * 0.2})`;
            
            if(count > 5) {
                noBtn.style.opacity = '0';
                noBtn.style.pointerEvents = 'none';
                yesBtn.innerText = "JUST SAY YES! ❤️";
                yesBtn.style.transform = 'scale(1.2)';
            }
        }

        // Support both mouse and touch
        noBtn.addEventListener('mouseover', runAway);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); runAway(); });
        noBtn.addEventListener('click', runAway);

        function acceptProposal() {
            yesBtn.innerText = "I Knew It! ❤️";
            yesBtn.classList.remove('pulse-heart');
            yesBtn.classList.add('animate__animated', 'animate__rubberBand');
            // Create full screen overlay
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-red-900/90 z-50 flex items-center justify-center text-white text-4xl font-bold animate__animated animate__fadeIn';
            overlay.innerHTML = "See you on Feb 14! 💍";
            document.body.appendChild(overlay);
        }
    </script>
</body>
</html>
