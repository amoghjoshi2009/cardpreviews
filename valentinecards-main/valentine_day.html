<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Be My Valentine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fce7f3; /* Pink-100 */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* The Gift Box */
        .gift-container {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .gift-container:active { transform: scale(0.95); }
        .gift-box-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom right, #db2777, #be123c);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .gift-lid {
            position: absolute;
            top: 20px;
            left: -10px;
            width: 220px;
            height: 60px;
            background: linear-gradient(to bottom right, #f472b6, #db2777);
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ribbon-vertical {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background: #fce7f3;
        }
        .ribbon-bow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            color: #fce7f3;
            z-index: 21;
        }
        
        /* The Question Card */
        .question-card {
            position: absolute;
            bottom: 20px;
            left: 10px;
            width: 180px;
            height: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 5; /* Start inside box */
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
        }
        .question-card.active {
            height: 350px;
            width: 300px;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30; /* Move in front */
            opacity: 1;
        }

        /* Particles */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: explode 1s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="relative w-full h-full flex items-center justify-center">
        <h2 id="instruction" class="absolute top-20 text-2xl text-pink-600 font-['Pacifico'] animate-bounce">Tap to Open! 🎁</h2>

        <div class="gift-container" id="giftBox" onclick="openGift()">
            <!-- Lid -->
            <div class="gift-lid" id="lid">
                <div class="ribbon-vertical"></div>
                <div class="ribbon-bow">🎀</div>
            </div>
            <!-- Box Body -->
            <div class="gift-box-bottom">
                <div class="ribbon-vertical"></div>
            </div>
            
            <!-- Hidden Card inside box -->
            <div class="question-card" id="card">
                <div class="p-6 w-full">
                    <div class="text-4xl mb-4">💘</div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-2 font-['Pacifico']">Be My Valentine?</h1>
                    <p class="text-gray-500 text-sm mb-6">I have a question for you...</p>
                    
                    <div class="space-y-3 relative h-32 w-full">
                        <button id="yesBtn" onclick="accept()" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold shadow-lg transition-transform active:scale-95 z-20 relative">
                            YES!
                        </button>
                        <button id="noBtn" class="bg-gray-200 text-gray-500 py-2 px-6 rounded-lg text-xs absolute left-1/2 transform -translate-x-1/2 bottom-0">
                            No thanks
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration" class="fixed inset-0 bg-pink-600 hidden flex-col items-center justify-center text-white z-50">
        <h1 class="text-6xl font-['Pacifico'] mb-4 animate__animated animate__tada">Woohoo! 🎉</h1>
        <p class="text-2xl">See you tonight! ❤️</p>
    </div>

    <script>
        const giftBox = document.getElementById('giftBox');
        const lid = document.getElementById('lid');
        const card = document.getElementById('card');
        const instruction = document.getElementById('instruction');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        let isOpen = false;

        function openGift() {
            if (isOpen) return;
            isOpen = true;
            
            // 1. Pop Lid
            lid.style.transform = 'translateY(-100px) rotate(-20deg) translateX(50px)';
            lid.style.opacity = '0';
            
            // 2. Hide instruction
            instruction.style.display = 'none';

            // 3. Explode confetti
            createExplosion();

            // 4. Show Card
            setTimeout(() => {
                card.classList.add('active');
            }, 300);
        }

        function createExplosion() {
            const colors = ['#ec4899', '#f43f5e', '#a855f7', '#fbbf24'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('confetti');
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '50%';
                p.style.top = '50%';
                
                // Random direction
                const tx = (Math.random() - 0.5) * 400 + 'px';
                const ty = (Math.random() - 1) * 400 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // Standard "No" Button Logic (Mobile Friendly)
        let noCount = 0;
        noBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Don't trigger box click if overlaid
            moveNoBtn();
        });
        // Also hover for desktop
        noBtn.addEventListener('mouseover', moveNoBtn);

        function moveNoBtn() {
            noCount++;
            
            // Move randomly within the card
            const maxMove = 50; 
            const x = (Math.random() - 0.5) * maxMove;
            const y = (Math.random() - 0.5) * maxMove;
            
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            
            // Grow Yes button
            yesBtn.style.transform = `scale(${1 + noCount * 0.15})`;

            if (noCount > 4) {
                // Take over
                yesBtn.style.position = 'absolute';
                yesBtn.style.inset = '0';
                yesBtn.style.height = '100%';
                yesBtn.style.width = '100%';
                yesBtn.innerText = "YES 💖";
                yesBtn.style.fontSize = '2rem';
                yesBtn.style.zIndex = '50';
                noBtn.style.display = 'none';
            }
        }

        function accept() {
            document.getElementById('celebration').classList.remove('hidden');
            document.getElementById('celebration').classList.add('flex');
        }
    </script>
</body>
</html>
