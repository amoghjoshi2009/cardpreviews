<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compatibility Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%; height: 4px; background: #ef4444; box-shadow: 0 0 10px #ef4444;
            animation: scan 1.5s linear infinite; display: none;
        }
        .scanning .scan-line { display: block; }
        .scanning svg { fill: #fecaca; transition: fill 2s; }
        body { touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-gray-900 h-screen flex flex-col items-center justify-center text-white p-6 overflow-hidden">

    <!-- Scanner Screen -->
    <div id="main-screen" class="flex flex-col items-center w-full max-w-md transition-opacity duration-500">
        <h1 class="text-2xl font-bold mb-8 text-center text-red-400">COMPATIBILITY TEST</h1>
        
        <div class="relative w-48 h-64 border-2 border-red-500/30 rounded-3xl flex items-center justify-center mb-8 bg-gray-800/50 backdrop-blur overflow-hidden transition-colors duration-300 touch-none" id="scanner-pad">
            <svg id="fingerprint" class="w-32 h-32 text-red-500/50 fill-current" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v1h2V7a3 3 0 0 1 6 0v1h2V7a5 5 0 0 0-5-5zm-5 8v2a5 5 0 0 0 10 0v-2h-2v2a3 3 0 0 1-6 0v-2H7zm-2 4v2a7 7 0 0 0 14 0v-2h-2v2a5 5 0 0 1-10 0v-2H5z" fill="currentColor"/><path opacity="0.5" d="M12 22c5.52 0 10-4.48 10-10h-2c0 4.41-3.59 8-8 8s-8-3.59-8-8H2c0 5.52 4.48 10 10 10z" fill="currentColor"/></svg>
            <div class="scan-line"></div>
        </div>

        <p id="status" class="text-gray-400 text-sm animate-pulse">HOLD FINGER TO SCAN</p>
        
        <div id="result" class="hidden mt-6 text-center animate-bounce">
            <div class="text-6xl font-black text-green-400 mb-2">100%</div>
            <div class="text-xl text-white font-bold">PERFECT MATCH</div>
        </div>
    </div>

    <!-- Proposal Screen (Hidden initially) -->
    <div id="proposal" class="hidden fixed inset-0 bg-red-600 z-50 flex-col items-center justify-center p-8 text-center animate-in zoom-in duration-500">
        <h1 class="text-5xl font-black text-white mb-6">IT'S A MATCH!</h1>
        <p class="text-white/90 text-xl mb-12">Scientifically proven. You have to say yes now.</p>
        <button onclick="acceptProposal()" class="bg-white text-red-600 font-bold py-5 px-12 rounded-full text-xl shadow-2xl hover:scale-105 active:scale-95 transition-transform">
            BE MY VALENTINE
        </button>
    </div>

    <!-- Final Success Screen -->
    <div id="final-success" class="hidden fixed inset-0 bg-white z-[60] flex-col items-center justify-center text-center">
        <div class="text-green-500 text-8xl mb-4 animate-bounce">✔️</div>
        <h2 class="text-4xl font-bold text-gray-800">ACCEPTED</h2>
        <p class="text-gray-500 mt-4">See you on Valentine's Day!</p>
    </div>

    <script>
        const pad = document.getElementById('scanner-pad');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const main = document.getElementById('main-screen');
        const proposal = document.getElementById('proposal');
        const finalSuccess = document.getElementById('final-success');
        
        let timer;
        let isScanning = false;

        function startScan(e) {
            e.preventDefault(); // Prevent scrolling
            if(isScanning) return;
            isScanning = true;
            pad.classList.add('scanning', 'border-red-500');
            status.innerText = "SCANNING...";
            status.classList.remove('text-red-500');
            timer = setTimeout(finishScan, 2000);
        }

        function stopScan() {
            if(!isScanning) return;
            clearTimeout(timer);
            isScanning = false;
            pad.classList.remove('scanning', 'border-red-500');
            status.innerText = "SCAN FAILED. HOLD LONGER.";
            status.classList.add('text-red-500');
        }

        function finishScan() {
            isScanning = false;
            pad.classList.remove('scanning');
            pad.classList.add('bg-green-500/20', 'border-green-500');
            document.getElementById('fingerprint').classList.add('text-green-500');
            status.innerText = "SCAN COMPLETE";
            result.classList.remove('hidden');
            
            setTimeout(() => {
                main.style.opacity = '0';
                setTimeout(() => {
                    main.classList.add('hidden');
                    proposal.classList.remove('hidden');
                    proposal.classList.add('flex');
                }, 500);
            }, 1500);
        }

        function acceptProposal() {
            finalSuccess.classList.remove('hidden');
            finalSuccess.classList.add('flex', 'animate-in', 'fade-in', 'duration-500');
        }

        pad.addEventListener('mousedown', startScan);
        pad.addEventListener('mouseup', stopScan);
        pad.addEventListener('mouseleave', stopScan);
        pad.addEventListener('touchstart', startScan);
        pad.addEventListener('touchend', stopScan);
    </script>
</body>
</html>
