<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Time Capsule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Observer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #111111;
            --vine-color: #4ade80;
            --accent-glow: rgba(74, 222, 128, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: pan-y; /* Allow vertical pan for the text content */
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            transition: background 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .progress-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            z-index: 100;
        }

        #vine-progress {
            height: 100%; width: 0%;
            background: var(--vine-color);
            box-shadow: 0 0 10px var(--accent-glow);
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .stack-container {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
            padding: 20px;
        }

        /* CARD CORE */
        .card {
            position: absolute;
            width: 95%;
            max-width: 380px;
            height: 80vh; 
            max-height: 650px; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: row;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            will-change: transform, width, max-width;
            overflow: hidden;
            transition: max-width 0.7s cubic-bezier(0.4, 0, 0.2, 1), 
                        width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Split State */
        .card.unlocked {
            max-width: 950px;
            width: 95%;
            height: 85vh;
            max-height: 750px;
        }

        /* LEFT SIDE */
        .card-visual {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .unlocked .card-visual {
            width: 40%;
        }

        /* RIGHT SIDE */
        .card-writing {
            width: 0%;
            opacity: 0;
            height: 100%;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.4s ease 0.3s;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-overflow-scrolling: touch;
        }

        .unlocked .card-writing {
            width: 60%;
            opacity: 1;
            padding: 40px;
        }

        .img-container {
            width: 100%;
            height: 160px; 
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            flex-shrink: 0;
            transition: height 0.7s ease;
        }

        .unlocked .img-container {
            height: 55%; 
        }

        .img-placeholder {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
        }

        /* HOLD INTERACTION */
        .hold-trigger {
            margin-top: auto; 
            width: 100%; height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; cursor: pointer; overflow: hidden;
            flex-shrink: 0;
        }

        .hold-progress {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: var(--vine-color);
            opacity: 0.3;
            transition: width 0.1s linear;
        }

        .unlocked .hold-trigger, 
        .unlocked .preview-poem {
            display: none;
        }

        /* NAV */
        .nav-controls {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px; z-index: 100;
        }
        .nav-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn.disabled { opacity: 0.1; pointer-events: none; }

        .meta-tag { font-size: 8px; letter-spacing: 2px; color: var(--vine-color); margin-bottom: 4px; display: block; font-weight: 700; }
        
        .card-writing::-webkit-scrollbar { width: 4px; }
        .card-writing::-webkit-scrollbar-track { background: transparent; }
        .card-writing::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .locked-title { font-size: 1.5rem; line-height: 1.2; }
        .unlocked .locked-title { font-size: 1.875rem; }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div class="progress-container">
        <div id="vine-progress"></div>
    </div>

    <div class="stack-container" id="stack"></div>

    <div class="nav-controls">
        <div id="prev-btn" class="nav-btn disabled" onclick="prevSlide()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <div id="next-btn" class="nav-btn" onclick="nextSlideManual()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </div>
    </div>

    <script>
        const memories = [
            {
                title: "The First Spark",
                date: "OCT 12",
                location: "THE COFFEE ARCHIVE",
                mood: "#121417",
                image: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=1200",
                poem: "A room of strangers, loud and vast,\nBut time slowed down as you walked past.\nA sudden rhythm in my chest,\nAs if my heart had found its rest.",
                content: "I remember exactly what you were wearing. That deep green scarf and a look of mild confusion that I found instantly endearing. You didn't just walk into the room; you changed the air in it. We talked for hours about things that didn't matter, yet they were the only things that did. \n\nThis was the moment the world shifted for me. I realized that my life could be divided into two parts: before I knew you, and everything after. You are the protagonist of every story I want to tell."
            },
            {
                title: "Midnight Whispers",
                date: "NOV 04",
                location: "CITY OVERLOOK",
                mood: "#1a1c2c",
                image: "https://images.unsplash.com/photo-1470219556762-1771e7f9427d?w=1200",
                poem: "City lights like fallen stars,\nTalking lean against the cars.\nThe world grew small, just you and me,\nA tiny island in the sea.",
                content: "We stayed up until 4 AM. We didn't even notice the cold. You told me about your fear of heights while we were literally looking down at the world. I knew then I'd catch you if you ever fell. \n\nThe way the wind caught your hair and the silence of the city below made it feel like we were the only two people left on earth."
            }
        ];

        for (let i = memories.length; i < 20; i++) {
            memories.push({
                title: `Chapter ${i+1}`,
                date: "A MOMENT",
                location: "LOST IN TIME",
                mood: i % 2 === 0 ? "#1c1414" : "#141c1c",
                image: `https://images.unsplash.com/photo-${1500000000000 + (i*1100)}?w=1200`,
                poem: "Another page, another rhyme,\nLost within the folds of time.",
                content: "Every memory here is a brick in the foundation of us. When you look at these images, I want you to feel the weight of the affection behind them. We have built something that transcends the simple passage of days."
            });
        }

        let currentIndex = 0;
        const stack = document.getElementById('stack');

        function renderStack() {
            stack.innerHTML = '';
            [currentIndex, currentIndex + 1].forEach((index) => {
                if (index >= memories.length) return;
                const data = memories[index];
                const card = document.createElement('div');
                card.className = `card ${index === currentIndex ? 'current' : 'next'}`;
                
                if (index === currentIndex) {
                    gsap.set(card, { zIndex: 10, y: 0, scale: 1, opacity: 1 });
                } else {
                    gsap.set(card, { zIndex: 5, y: 40, scale: 0.85, opacity: 0.3 });
                }

                card.innerHTML = `
                    <div class="card-visual">
                        <span class="meta-tag">${data.date} • ${data.location}</span>
                        <h2 class="locked-title font-bold mb-3 tracking-tight">${data.title}</h2>
                        <div class="img-container">
                            <div class="img-placeholder" style="background-image: url('${data.image}')"></div>
                        </div>
                        <p class="preview-poem serif italic text-lg opacity-80 overflow-hidden" style="white-space: pre-line; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;">${data.poem}</p>
                        
                        <div class="hold-trigger" 
                             onmousedown="startHold(event)" 
                             ontouchstart="startHold(event)" 
                             onmouseup="endHold()" 
                             ontouchend="endHold()">
                            <div class="hold-progress"></div>
                            <span class="relative z-10 text-[9px] font-bold tracking-[0.2em] uppercase">Hold to Open Letter</span>
                        </div>
                    </div>

                    <div class="card-writing">
                        <div class="writing-header">
                            <span class="meta-tag">CHAPTER ${index + 1}</span>
                            <h3 class="text-4xl font-bold mb-6 serif tracking-tight">${data.title}</h3>
                        </div>
                        <div class="card-content-inner">
                            <p class="serif italic text-2xl mb-8 leading-relaxed text-emerald-300/90" style="white-space: pre-line;">${data.poem}</p>
                            <div class="h-px w-12 bg-white/10 mb-8"></div>
                            <p class="text-lg font-light leading-relaxed text-white/80 pb-20" style="white-space: pre-line;">${data.content}</p>
                        </div>
                    </div>
                `;
                stack.appendChild(card);
            });
            updateUI();
        }

        function updateUI() {
            const progress = ((currentIndex + 1) / memories.length) * 100;
            const vine = document.getElementById('vine-progress');
            if (vine) vine.style.width = `${progress}%`;
            document.getElementById('bg-canvas').style.backgroundColor = memories[currentIndex].mood;
            document.getElementById('prev-btn').classList.toggle('disabled', currentIndex === 0);
            document.getElementById('next-btn').classList.toggle('disabled', currentIndex === memories.length - 1);
        }

        let holdInterval;
        let holdValue = 0;

        function startHold(e) {
            const card = e.currentTarget.closest('.card');
            if (card.classList.contains('unlocked')) return;
            holdValue = 0;
            const progress = e.currentTarget.querySelector('.hold-progress');
            holdInterval = setInterval(() => {
                holdValue += 3;
                progress.style.width = holdValue + '%';
                if (holdValue >= 100) { 
                    clearInterval(holdInterval); 
                    card.classList.add('unlocked');
                    if(navigator.vibrate) navigator.vibrate([30, 20, 30]);
                }
            }, 20);
        }

        function endHold() {
            clearInterval(holdInterval);
            if (holdValue < 100) {
                const currentProgress = document.querySelector('.current .hold-progress');
                if (currentProgress) currentProgress.style.width = '0%';
            }
        }

        function nextSlide() {
            if (currentIndex >= memories.length - 1) return;
            const current = document.querySelector('.card.current');
            gsap.to(current, { 
                y: -window.innerHeight, 
                rotate: -10, 
                opacity: 0, 
                duration: 0.8, 
                ease: "expo.inOut", 
                onComplete: () => {
                    currentIndex++; 
                    renderStack();
                }
            });
        }

        function prevSlide() {
            if (currentIndex <= 0) return;
            currentIndex--; 
            renderStack();
            gsap.fromTo(document.querySelector('.card.current'), 
                { y: -window.innerHeight, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 0.8, ease: "expo.out" }
            );
        }

        function nextSlideManual() {
            const card = document.querySelector('.card.current');
            if (card && card.classList.contains('unlocked')) {
                nextSlide();
            } else if (card) {
                // Shake if not unlocked
                gsap.to(card, { x: 10, duration: 0.1, yoyo: true, repeat: 3 });
            }
        }

        window.onload = renderStack;
    </script>
</body>
</html>
