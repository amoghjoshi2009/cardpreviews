<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rose Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Prevent scroll on mobile */
            touch-action: manipulation;
        }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        canvas {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative p-4">

    <!-- Background Blobs -->
    <div class="absolute top-10 -left-10 w-40 h-40 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
    <div class="absolute top-10 -right-10 w-40 h-40 bg-red-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-10 left-1/2 w-40 h-40 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>

    <div class="glass p-6 rounded-3xl shadow-xl text-center w-full max-w-sm z-10 animate__animated animate__fadeInUp">
        <h1 class="text-4xl text-red-600 font-cursive mb-2">Happy Rose Day</h1>
        <p class="text-gray-700 mb-4 text-sm">A mathematical rose, blooming just for you.</p>
        
        <div class="flex justify-center mb-6">
            <canvas id="roseCanvas" width="300" height="300"></canvas>
        </div>

        <button onclick="handleYes()" class="w-full py-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow-lg transform transition-all active:scale-95 font-bold text-lg">
            Accept Rose 🌹
        </button>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="bg-white p-8 rounded-2xl text-center animate__animated animate__zoomIn w-full max-w-xs">
            <h2 class="text-3xl text-red-500 font-cursive mb-2">Thank you! 🌹</h2>
            <p class="text-gray-600">See you tomorrow!</p>
            <button onclick="document.getElementById('successModal').style.display='none'" class="mt-4 px-6 py-2 bg-gray-200 rounded-lg text-sm">Close</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('roseCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        let angle = 0;
        const maxAngle = Math.PI * 10; 
        const k = 4; 
        const scale = 80;

        ctx.lineWidth = 2;
        ctx.strokeStyle = '#e11d48'; 
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#fda4af';

        let lastX = centerX;
        let lastY = centerY;

        function drawRose() {
            if (angle > maxAngle) return;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);

            const r = scale * Math.sin(k * angle);
            const x = centerX + r * Math.cos(angle);
            const y = centerY + r * Math.sin(angle);

            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;
            angle += 0.05;

            requestAnimationFrame(drawRose);
        }
        setTimeout(drawRose, 500);

        function handleYes() {
            document.getElementById('successModal').style.display = 'flex';
        }
    </script>
</body>
</html>
