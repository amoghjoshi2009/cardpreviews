<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teddy Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #fff1f2; font-family: 'Fredoka One', cursive; touch-action: manipulation; }
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.15);
        }
        .blush { transition: fill-opacity 0.5s ease; }
        #teddy { cursor: pointer; transition: transform 0.2s; }
        #teddy:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div class="glass p-8 text-center w-full max-w-sm relative">
        <h1 class="text-3xl text-pink-500 mb-2">Happy Teddy Day!</h1>
        <p class="text-gray-500 mb-6 text-sm animate-pulse">Tap the Teddy to Hug!</p>
        
        <!-- Interactive SVG Teddy -->
        <svg id="teddy" width="220" height="220" viewBox="0 0 200 200" class="mx-auto drop-shadow-lg" onclick="hugTeddy()">
            <!-- Ears -->
            <circle cx="50" cy="60" r="25" fill="#d97706" />
            <circle cx="150" cy="60" r="25" fill="#d97706" />
            <circle cx="50" cy="60" r="15" fill="#fcd34d" />
            <circle cx="150" cy="60" r="15" fill="#fcd34d" />
            
            <!-- Head -->
            <circle cx="100" cy="100" r="60" fill="#d97706" />
            
            <!-- Eyes -->
            <circle class="eye" cx="80" cy="90" r="5" fill="#000" />
            <circle class="eye" cx="120" cy="90" r="5" fill="#000" />
            
            <!-- Snout -->
            <ellipse cx="100" cy="115" rx="20" ry="15" fill="#fcd34d" />
            <circle cx="100" cy="110" r="5" fill="#451a03" />
            <!-- Smile -->
            <path id="smile" d="M100 115 L100 125 M95 125 Q100 130 105 125" stroke="#451a03" stroke-width="2" fill="none"/>

            <!-- Cheeks (Blush) -->
            <circle id="cheek-l" cx="70" cy="105" r="8" fill="#ec4899" fill-opacity="0" class="blush" />
            <circle id="cheek-r" cx="130" cy="105" r="8" fill="#ec4899" fill-opacity="0" class="blush" />

            <!-- Arms (initially hidden or lowered) -->
            <path id="arms" d="M40 140 Q 100 180 160 140" stroke="#d97706" stroke-width="15" fill="none" stroke-linecap="round" opacity="0" />
        </svg>

        <h2 id="status" class="text-xl text-amber-600 mt-6 min-h-[2rem]">Waiting for hug...</h2>
    </div>

    <script>
        const cheekL = document.getElementById('cheek-l');
        const cheekR = document.getElementById('cheek-r');
        const status = document.getElementById('status');
        const teddy = document.getElementById('teddy');
        const arms = document.getElementById('arms');

        function hugTeddy() {
            // Blush
            cheekL.setAttribute('fill-opacity', '0.6');
            cheekR.setAttribute('fill-opacity', '0.6');
            
            // Animation
            teddy.classList.add('animate__animated', 'animate__tada');
            
            // Show Arms (Hug)
            arms.setAttribute('opacity', '1');
            arms.setAttribute('d', 'M50 150 Q 100 120 150 150'); // Move arms up

            status.innerText = "YAY! Hug received! 🧸❤️";
            
            // Confetti
            createHearts();

            setTimeout(() => {
                teddy.classList.remove('animate__animated', 'animate__tada');
            }, 1000);
        }

        function createHearts() {
            for(let i=0; i<10; i++) {
                const heart = document.createElement('div');
                heart.innerText = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = '50%';
                heart.style.top = '50%';
                heart.style.fontSize = '24px';
                heart.style.transform = `translate(-50%, -50%)`;
                heart.style.pointerEvents = 'none';
                heart.classList.add('animate__animated', 'animate__fadeOutUp');
                // Random scatter
                const x = (Math.random() - 0.5) * 200;
                const y = (Math.random() - 1) * 200;
                heart.style.setProperty('--animate-duration', '1.5s');
                heart.style.transform = `translate(${x}px, ${y}px)`;
                
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }
        }
    </script>
</body>
</html>
