<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sunshine Atlas of Her</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Outfit:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --sky: #87CEEB;
            --cloud: #ffffff;
            --sun: #FFD700;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Animated Bright Background */
        .sky-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: var(--cloud);
            border-radius: 50px;
            opacity: 0.8;
            filter: blur(5px);
            animation: moveClouds linear infinite;
        }

        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        /* Polaroid Card Design */
        .card-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-center: center;
            align-items: center;
            perspective: 1000px;
            z-index: 10;
        }

        .polaroid {
            position: absolute;
            width: 85%;
            max-width: 320px;
            background: white;
            padding: 15px 15px 60px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) translateY(50px);
            opacity: 0;
            pointer-events: none;
        }

        .polaroid.active {
            opacity: 1;
            transform: scale(1) translateY(0) rotate(2deg);
            pointer-events: auto;
        }

        .polaroid.exit {
            opacity: 0;
            transform: scale(0.8) translateY(-100px) rotate(-10deg);
        }

        .polaroid-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #eee;
            margin-bottom: 20px;
            position: relative;
        }

        /* UI Controls */
        .nav-buttons {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .btn {
            background: white;
            color: #3b82f6;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            cursor: pointer;
        }

        .btn:active { transform: scale(0.95); }

        .hint-text {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Gaegu', cursive;
            font-size: 1.2rem;
            color: #1e40af;
            z-index: 100;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .continent-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            text-align: center;
            color: #1e293b;
        }

        .discovery-banner {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            z-index: 200;
            transition: 0.5s ease;
        }
        .discovery-banner.show { top: 70px; }

        .detail-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #475569;
            margin-top: 10px;
            display: none;
        }

        .active .detail-text { display: block; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sky-container" id="sky"></div>
    <div id="banner" class="discovery-banner font-bold">Sticker Collected! ✨</div>
    <div class="hint-text">10 Continents of Magic</div>

    <div class="card-container" id="cardStack">
        <!-- Cards will be injected by JS -->
    </div>

    <div class="nav-buttons">
        <button class="btn" onclick="prevCard()" id="backBtn" style="visibility: hidden;">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Back
        </button>
        <button class="btn" onclick="nextCard()" id="nextBtn">
            Explore Next
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
    </div>

    <script>
        const data = [
            { id: 1, title: "Intellect", sub: "The Spark of Thought", detail: "Your mind is like a clear summer morning. You solve puzzles with such ease that it feels like magic to watch. You don't just know things; you understand them deeply.", icon: "brain" },
            { id: 2, title: "Kindness", sub: "The Gentle Breeze", detail: "The way you treat people—even those you don't know—is a lesson in warmth. Your heart is an endless spring of goodness that makes the world feel safe.", icon: "heart" },
            { id: 3, title: "Strength", sub: "The Unmovable Peak", detail: "True strength isn't about being loud; it's about being steady. You are the most reliable person I know, standing firm no matter how the wind blows.", icon: "shield" },
            { id: 4, title: "Humor", sub: "The Valley of Giggles", detail: "Your laugh is literally music. You find the funny side of life in a way that turns a rainy day into a bright one instantly.", icon: "face-smile" },
            { id: 5, title: "Creativity", sub: "The Colorful Horizon", detail: "You don't just see the world; you reinvent it. Your imagination adds color to everything you touch, from your hobbies to your conversations.", icon: "palette" },
            { id: 6, title: "Loyalty", sub: "The Steady Anchor", detail: "When you choose a friend, you stay by them forever. Your loyalty is a rare treasure in a world that changes too fast.", icon: "anchor" },
            { id: 7, title: "Passion", sub: "The Golden Sun", detail: "The energy you put into the things you love is radiant. It makes everyone around you want to find something they love that much too.", icon: "fire" },
            { id: 8, title: "Wisdom", sub: "The Ancient Library", detail: "You have an old soul that knows just what to say. Your advice is like a map when someone else is lost.", icon: "book" },
            { id: 9, title: "Adventure", sub: "The Open Path", detail: "You're always ready for a new story. With you, even a trip to the store feels like we're explorers discovering a new world.", icon: "map" },
            { id: 10, title: "Grace", sub: "The Sky's Light", detail: "You carry yourself with a natural elegance. It's not just how you move, but how you handle yourself with such poise and kindness.", icon: "star" }
        ];

        let currentIndex = 0;
        const stack = document.getElementById('cardStack');

        // Create Clouds
        function createClouds() {
            const sky = document.getElementById('sky');
            for(let i=0; i<6; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                cloud.style.width = (Math.random() * 100 + 100) + 'px';
                cloud.style.height = (Math.random() * 40 + 30) + 'px';
                cloud.style.top = (Math.random() * 60) + '%';
                cloud.style.left = '-200px';
                cloud.style.animationDuration = (Math.random() * 20 + 20) + 's';
                cloud.style.animationDelay = (Math.random() * 10) + 's';
                sky.appendChild(cloud);
            }
        }

        // Initialize Cards
        function initCards() {
            data.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `polaroid ${i === 0 ? 'active' : ''}`;
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div class="polaroid-img">
                        <img src="https://api.dicebear.com/7.x/notionists/svg?seed=${item.title}" class="w-32 h-32">
                        <div class="absolute -top-3 -right-3 bg-yellow-400 rounded-full p-2 cursor-pointer shadow-lg active:scale-90" onclick="collectSticker(event)">✨</div>
                    </div>
                    <div class="continent-label">${item.title}</div>
                    <div class="handwritten text-center text-blue-400 text-sm mb-2">${item.sub}</div>
                    <div class="detail-text text-center">${item.detail}</div>
                `;
                stack.appendChild(card);
            });
        }

        function nextCard() {
            if (currentIndex < data.length - 1) {
                const current = document.getElementById(`card-${currentIndex}`);
                current.classList.remove('active');
                current.classList.add('exit');
                
                currentIndex++;
                const next = document.getElementById(`card-${currentIndex}`);
                next.classList.add('active');
                
                updateBtns();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                const current = document.getElementById(`card-${currentIndex}`);
                current.classList.remove('active');
                
                currentIndex--;
                const prev = document.getElementById(`card-${currentIndex}`);
                prev.classList.remove('exit');
                prev.classList.add('active');
                
                updateBtns();
            }
        }

        function updateBtns() {
            document.getElementById('backBtn').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
            const nextBtn = document.getElementById('nextBtn');
            if (currentIndex === data.length - 1) {
                nextBtn.innerHTML = 'You Found Them All! ❤️';
            } else {
                nextBtn.innerHTML = 'Explore Next <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
            }
        }

        function collectSticker(e) {
            e.stopPropagation();
            const banner = document.getElementById('banner');
            banner.classList.add('show');
            e.target.style.display = 'none';
            setTimeout(() => banner.classList.remove('show'), 2000);
        }

        createClouds();
        initCards();
    </script>
</body>
</html>
