<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Valentine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f9ff;
            font-family: 'Press Start 2P', cursive;
        }
        .device {
            box-shadow: 15px 15px 0px rgba(0,0,0,0.1), inset -10px -10px 0 rgba(0,0,0,0.1);
        }
        .screen-shadow {
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.2);
        }
        .pixel-btn {
            box-shadow: 0 4px 0 #b91c1c; /* Darker shade of red */
        }
        .pixel-btn:active {
            box-shadow: 0 0 0 #b91c1c;
            transform: translateY(4px);
        }
        .pixel-btn-blue {
            box-shadow: 0 4px 0 #1d4ed8;
        }
        .pixel-btn-blue:active {
            box-shadow: 0 0 0 #1d4ed8;
            transform: translateY(4px);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Game Device Shell -->
    <div class="device bg-yellow-400 p-6 rounded-[40px] w-full max-w-md border-4 border-black relative">
        
        <!-- Power Light -->
        <div class="absolute top-8 left-8 w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
        <div class="text-xs text-center mb-2 opacity-50">VALENTINE-BOY COLOR</div>

        <!-- The Screen -->
        <div class="bg-[#9bbc0f] p-4 rounded-xl border-4 border-gray-700 screen-shadow h-64 flex flex-col items-center justify-center relative overflow-hidden">
            <!-- Scanline effect for screen -->
            <div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.1)_50%)] bg-[length:100%_4px] pointer-events-none z-10"></div>
            
            <div id="pet-container" class="z-0 text-center">
                <div id="pet-face" class="text-6xl mb-4 text-[#0f380f] animate-bounce">(•‿•)</div>
                <p id="pet-text" class="text-[#0f380f] text-sm leading-6">WILL U BE MINE?</p>
            </div>
        </div>

        <!-- Brand Text -->
        <div class="text-right italic font-bold opacity-40 mt-1 mb-6 mr-4">Nintendoo</div>

        <!-- Controls -->
        <div class="flex justify-between items-end px-4 mb-8">
            <!-- D-Pad (Visual only) -->
            <div class="w-24 h-24 relative opacity-50">
                <div class="absolute top-0 left-8 w-8 h-24 bg-black rounded"></div>
                <div class="absolute top-8 left-0 w-24 h-8 bg-black rounded"></div>
                <div class="absolute top-9 left-9 w-6 h-6 bg-gray-800 rounded-full"></div>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-4">
                <div class="flex flex-col items-center gap-2">
                    <button id="no-btn" class="w-14 h-14 rounded-full bg-blue-600 border-b-4 border-blue-800 pixel-btn-blue text-white text-xs flex items-center justify-center">B</button>
                    <span class="text-xs font-bold text-blue-900">NO</span>
                </div>
                <div class="flex flex-col items-center gap-2 mt-[-20px]">
                    <button id="yes-btn" class="w-14 h-14 rounded-full bg-red-600 border-b-4 border-red-800 pixel-btn text-white text-xs flex items-center justify-center">A</button>
                    <span class="text-xs font-bold text-red-900">YES</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const face = document.getElementById('pet-face');
        const text = document.getElementById('pet-text');
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');

        const sadFaces = ["(TxT)", "(;_;)", "(>_<)", "(TnT)"];
        const happyFaces = ["(^o^)", "(♥_♥)", "(UwU)", "(>3<)"];

        noBtn.addEventListener('click', () => {
            // Random sad face
            face.innerText = sadFaces[Math.floor(Math.random() * sadFaces.length)];
            face.classList.remove('animate-bounce');
            face.classList.add('animate-pulse'); // Shock effect
            
            text.innerText = "ERROR: HEART NOT FOUND.\nTRY AGAIN!";
            
            // Reset after 2 seconds
            setTimeout(() => {
                face.innerText = "(•‿•)";
                face.classList.add('animate-bounce');
                face.classList.remove('animate-pulse');
                text.innerText = "WILL U BE MINE?";
            }, 2000);
        });

        yesBtn.addEventListener('click', () => {
            face.innerText = "(♥o♥)";
            text.innerHTML = "YAY!!!<br>GAME OVER<br>YOU WON MY HEART";
            
            // Celebration animation loop
            let i = 0;
            setInterval(() => {
                face.innerText = happyFaces[i % happyFaces.length];
                i++;
            }, 500);
        });
    </script>
</body>
</html>
