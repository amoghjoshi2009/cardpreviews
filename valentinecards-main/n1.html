    <!-- GAME LOGIC -->
    <script>
        // --- 0. ASSET PRELOADER & SETUP ---
        const Assets = {
            you: new Image(),
            partner: new Image(),
            couple: new Image(),
            memories: []
        };

        function preloadImages() {
            document.getElementById('header-avatar').src = MY_VALENTINE.images.partner;
            document.getElementById('menu-love-note').innerText = `"${MY_VALENTINE.loveNote}"`;
            document.getElementById('icon-p1').src = MY_VALENTINE.images.you;
            document.getElementById('icon-p2').src = MY_VALENTINE.images.partner;

            Assets.you.src = MY_VALENTINE.images.you;
            Assets.partner.src = MY_VALENTINE.images.partner;
            Assets.couple.src = MY_VALENTINE.images.couple;
            
            // Expand memories to ensure we have enough for 16 pairs (32 cards)
            let srcList = [...MY_VALENTINE.memories];
            if(srcList.length < 16) {
                // Fill remaining with repeats if not enough images
                while(srcList.length < 16) srcList = srcList.concat(MY_VALENTINE.memories);
            }
            srcList = srcList.slice(0, 16); // limit to 16 unique bases

            srcList.forEach(url => {
                const img = new Image();
                img.src = url;
                Assets.memories.push(img);
            });
        }

        // --- 1. AUDIO ---
        const Sound = (() => {
            let ctx = null; let muted = false;
            const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); };
            const playTone = (freq, type, duration, vol=0.1) => {
                if (muted || !ctx) return;
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+duration);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime+duration);
            };
            return {
                init, toggle: ()=>{muted=!muted; return muted;},
                playClick: ()=>playTone(600, 'sine', 0.1),
                playWin: ()=>[440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.3),i*100)),
                playPop: ()=>playTone(800+Math.random()*200, 'sine', 0.1),
                playError: ()=>playTone(150, 'sawtooth', 0.3)
            };
        })();

        // --- 2. STORAGE ---
        const Storage = {
            get: (id) => JSON.parse(localStorage.getItem('love_arcade')||'{}')[id] || 0,
            set: (id, score) => {
                const data = JSON.parse(localStorage.getItem('love_arcade')||'{}');
                if(score > (data[id]||0)) { data[id]=score; localStorage.setItem('love_arcade', JSON.stringify(data)); return true; }
                return false;
            }
        };

        // --- 3. GAMES ---
        
        // GAME: SNAKE
        class SnakeGame {
            constructor(container, onScore) {
                this.c = document.createElement('canvas');
                this.ctx = this.c.getContext('2d');
                this.container = container; this.onScore = onScore;
                this.grid = 25;
            }
            start() {
                this.container.innerHTML = ''; 
                const r = this.container.getBoundingClientRect();
                const size = Math.floor(Math.min(r.width, r.height)/this.grid)*this.grid;
                this.c.width = size; this.c.height = size;
                this.c.className = 'game-canvas bg-white shadow-lg';
                this.container.appendChild(this.c);
                this.cols = size/this.grid; this.rows = size/this.grid;
                this.snake = [{x:5,y:5}, {x:4,y:5}];
                this.dir = {x:1,y:0}; this.nextDir = {x:1,y:0};
                this.food = this.getFood();
                this.score = 0; this.running = true;
                this.addControls();
                this.lastT = 0; this.speed = 150;
                requestAnimationFrame(t => this.loop(t));
                App.showToast(`Use Arrow Keys or Swipe`);
            }
            getFood() {
                let f; do { f={x:Math.floor(Math.random()*this.cols), y:Math.floor(Math.random()*this.rows)}; } 
                while(this.snake.some(s=>s.x===f.x && s.y===f.y)); return f;
            }
            addControls() {
                window.onkeydown = e => {
                    const k = e.key;
                    if(k==='ArrowUp' && this.dir.y===0) this.nextDir={x:0,y:-1};
                    if(k==='ArrowDown' && this.dir.y===0) this.nextDir={x:0,y:1};
                    if(k==='ArrowLeft' && this.dir.x===0) this.nextDir={x:-1,y:0};
                    if(k==='ArrowRight' && this.dir.x===0) this.nextDir={x:1,y:0};
                };
                let sx, sy;
                this.c.ontouchstart = e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; };
                this.c.ontouchend = e => {
                    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
                    if(Math.abs(dx)>Math.abs(dy)) {
                        if(dx>30 && this.dir.x===0) this.nextDir={x:1,y:0};
                        else if(dx<-30 && this.dir.x===0) this.nextDir={x:-1,y:0};
                    } else {
                        if(dy>30 && this.dir.y===0) this.nextDir={x:0,y:1};
                        else if(dy<-30 && this.dir.y===0) this.nextDir={x:0,y:-1};
                    }
                };
            }
            loop(t) {
                if(!this.running) return;
                requestAnimationFrame(t => this.loop(t));
                if(t - this.lastT < this.speed) return;
                this.lastT = t;
                this.dir = this.nextDir;
                const h = {x:this.snake[0].x+this.dir.x, y:this.snake[0].y+this.dir.y};
                if(h.x<0||h.x>=this.cols||h.y<0||h.y>=this.rows||this.snake.some(s=>s.x===h.x&&s.y===h.y)) {
                    this.running=false; App.endGame(this.score); return;
                }
                this.snake.unshift(h);
                if(h.x===this.food.x && h.y===this.food.y) {
                    this.score+=10; this.onScore(this.score); Sound.playPop();
                    this.food = this.getFood();
                    if(this.speed>80) this.speed-=2;
                } else this.snake.pop();
                this.draw();
            }
            draw() {
                this.ctx.fillStyle = '#fff5f8'; this.ctx.fillRect(0,0,this.c.width,this.c.height);
                // Food
                this.ctx.save(); this.ctx.beginPath();
                this.ctx.arc(this.food.x*this.grid+this.grid/2, this.food.y*this.grid+this.grid/2, this.grid/2-2, 0, Math.PI*2);
                this.ctx.clip();
                this.ctx.drawImage(Assets.partner, this.food.x*this.grid, this.food.y*this.grid, this.grid, this.grid);
                this.ctx.restore();
                // Snake
                this.snake.forEach((s, i) => {
                    if(i===0) {
                        this.ctx.save(); this.ctx.beginPath();
                        this.ctx.arc(s.x*this.grid+this.grid/2, s.y*this.grid+this.grid/2, this.grid/2, 0, Math.PI*2);
                        this.ctx.clip();
                        this.ctx.drawImage(Assets.you, s.x*this.grid, s.y*this.grid, this.grid, this.grid);
                        this.ctx.restore();
                        this.ctx.strokeStyle = '#d4af37'; this.ctx.lineWidth=2; this.ctx.stroke();
                    } else {
                        this.ctx.fillStyle = i%2===0?'#ffb7c5':'#ff85a1';
                        this.ctx.beginPath(); this.ctx.roundRect(s.x*this.grid+2, s.y*this.grid+2, this.grid-4, this.grid-4, 4); this.ctx.fill();
                    }
                });
            }
            cleanup() { this.running = false; window.onkeydown = null; }
        }

        // GAME: SCRAMBLE (5x5 Swap)
        class ScrambleGame {
            constructor(container, onScore) { this.container = container; this.onScore = onScore; }
            start() {
                // 5x5 = 25 tiles
                this.size = 5;
                this.tiles = Array.from({length: this.size*this.size}, (_, i) => i);
                this.tiles.sort(() => Math.random() - 0.5);
                
                this.selected = null;
                this.render();
                this.onScore(0);
                App.showToast("Tap two pieces to swap them!");
            }
            render() {
                const w = Math.min(window.innerWidth - 40, 350);
                this.container.innerHTML = `
                    <div class="grid grid-cols-5 gap-0.5 bg-luxury-gold/30 p-1 rounded-lg" style="width:${w}px; height:${w}px;">
                    ${this.tiles.map((t, i) => {
                        // Original Coordinates
                        const ox = (t % 5) * 25; // 0, 25, 50, 75, 100
                        const oy = Math.floor(t / 5) * 25;
                        const isSel = this.selected === i;
                        return `
                        <div onclick="App.game.click(${i})" 
                             class="w-full h-full cursor-pointer transition-all duration-200 ${isSel ? 'ring-2 ring-luxury-rose z-10 scale-95 brightness-110' : ''}"
                             style="
                                background-image: url('${MY_VALENTINE.images.couple}'); 
                                background-size: 500%; 
                                background-position: ${ox}% ${oy}%;
                                border-radius: 4px;
                             ">
                        </div>`;
                    }).join('')}
                    </div>
                `;
            }
            click(i) {
                if (this.selected === null) {
                    this.selected = i;
                    this.render();
                    Sound.playClick();
                } else {
                    if (this.selected !== i) {
                        // Swap
                        [this.tiles[this.selected], this.tiles[i]] = [this.tiles[i], this.tiles[this.selected]];
                        Sound.playPop();
                        this.selected = null;
                        this.render();
                        this.checkWin();
                    } else {
                        // Deselect
                        this.selected = null;
                        this.render();
                    }
                }
            }
            checkWin() {
                if (this.tiles.every((t, i) => t === i)) {
                    App.endGame(1000); // High score for puzzle
                }
            }
            cleanup(){}
        }

        // GAME: MEMORY (32 Cards / 16 Pairs)
        class MemoryGame {
            constructor(container, onScore) { this.container=container; this.onScore=onScore; }
            start() {
                // We need 16 pairs. 
                // We preload Assets.memories. We can use indices 0..15.
                // If fewer than 16 assets, wrap around using modulo.
                let indices = [];
                for(let i=0; i<8; i++) {
                    indices.push(i % Assets.memories.length); // Pair 1
                    indices.push(i % Assets.memories.length); // Pair 2
                }
                
                // Shuffle
                this.deck = indices.sort(() => Math.random() - 0.5);

                this.container.innerHTML = `
                <div class="overflow-y-auto w-full h-full flex flex-col items-center py-4">
                    <div class="grid grid-cols-4 gap-2 w-full max-w-sm px-2 pb-20">
                        ${this.deck.map((imgIdx, i) => `
                            <div class="aspect-[3/4] flip-card cursor-pointer" onclick="App.game.flip(${i})">
                                <div class="flip-card-inner shadow-sm rounded-lg bg-white" id="card-${i}">
                                    <div class="flip-card-front bg-gradient-to-br from-luxury-pink to-luxury-gold">
                                        <i class="ph-fill ph-heart text-white text-xl"></i>
                                    </div>
                                    <div class="flip-card-back bg-white border border-luxury-gold p-0.5">
                                        <img src="${Assets.memories[imgIdx].src}" class="w-full h-full object-cover rounded">
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
                
                this.flipped=[]; this.matches=0; this.locked=false; this.score=0;
            }
            flip(i) {
                if(this.locked || document.getElementById(`card-${i}`).parentNode.classList.contains('flipped')) return;
                const el = document.getElementById(`card-${i}`).parentNode;
                el.classList.add('flipped');
                
                // Store index and image source for comparison
                const imgSrc = Assets.memories[this.deck[i]].src;
                this.flipped.push({i, src: imgSrc, el});
                Sound.playClick();
                
                if(this.flipped.length===2) {
                    this.locked=true;
                    if(this.flipped[0].src === this.flipped[1].src) {
                        this.matches++; 
                        this.score+=50; 
                        this.onScore(this.score);
                        this.flipped=[]; this.locked=false; Sound.playPop();
                        
                        if(this.matches===16) setTimeout(()=>App.endGame(this.score + 500), 500);
                    } else {
                        setTimeout(()=>{
                            this.flipped.forEach(f=>f.el.classList.remove('flipped'));
                            this.flipped=[]; this.locked=false;
                        }, 800);
                    }
                }
            }
            cleanup(){}
        }

        // GAME: TIC TAC TOE
        class TTTGame {
            constructor(container, onScore) { this.container=container; this.onScore=onScore; }
            start() {
                this.board = Array(9).fill(null); this.active=true;
                this.container.innerHTML = `
                <div class="grid grid-cols-3 gap-3 p-4 bg-white/60 backdrop-blur rounded-2xl shadow-gold">
                    ${Array(9).fill(0).map((_,i)=>`<div onclick="App.game.move(${i})" class="ttt-cell w-20 h-20 bg-white rounded-xl shadow-sm flex items-center justify-center overflow-hidden cursor-pointer active:scale-95 transition"></div>`).join('')}
                </div>
                <div id="ttt-msg" class="mt-8 font-serif text-luxury-deep font-bold">Your Move, ${MY_VALENTINE.names.you}</div>`;
            }
            move(i) {
                if(!this.active || this.board[i]) return;
                this.makeMove(i, 'human');
                if(this.checkEnd()) return;
                document.getElementById('ttt-msg').innerText = `${MY_VALENTINE.names.partner} is thinking...`;
                setTimeout(() => {
                    const avail = this.board.map((v,k)=>v?null:k).filter(k=>k!==null);
                    if(avail.length>0) this.makeMove(avail[Math.floor(Math.random()*avail.length)], 'ai');
                    if(!this.checkEnd()) document.getElementById('ttt-msg').innerText = "Your Turn";
                }, 600);
            }
            makeMove(i, p) {
                this.board[i]=p;
                const img = p==='human' ? Assets.you.src : Assets.partner.src;
                const border = p==='human' ? 'border-luxury-rose' : 'border-luxury-gold';
                document.querySelectorAll('.ttt-cell')[i].innerHTML = `<img src="${img}" class="w-full h-full object-cover border-4 ${border} box-border">`;
                Sound.playPop();
            }
            checkEnd() {
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                const win = wins.find(w => this.board[w[0]] && this.board[w[0]]===this.board[w[1]] && this.board[w[1]]===this.board[w[2]]);
                if(win) {
                    this.active=false;
                    const winner = this.board[win[0]];
                    document.getElementById('ttt-msg').innerText = winner==='human' ? "You Won!" : `${MY_VALENTINE.names.partner} Won!`;
                    App.endGame(winner==='human'?100:50); return true;
                }
                if(!this.board.includes(null)) {
                    this.active=false; document.getElementById('ttt-msg').innerText = "It's a Tie!";
                    App.endGame(50); return true;
                }
                return false;
            }
            cleanup(){}
        }

        // NEW GAME: KISS CATCH (Whack-a-Mole style)
        class KissGame {
            constructor(container, onScore) { this.container=container; this.onScore=onScore; }
            start() {
                this.gridSize = 9;
                this.container.innerHTML = `
                    <div class="grid grid-cols-3 gap-4">
                        ${Array(9).fill(0).map((_,i) => `
                            <div id="hole-${i}" class="w-20 h-20 bg-luxury-pink/20 rounded-full relative overflow-hidden flex items-center justify-center shadow-inner">
                                <div id="mole-${i}" class="absolute w-16 h-16 rounded-full transition-transform duration-200 scale-0 pointer-events-none" 
                                     style="background-image: url('${MY_VALENTINE.images.partner}'); background-size: cover;"></div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                // Add click handlers
                for(let i=0; i<9; i++) {
                    document.getElementById(`hole-${i}`).onclick = () => this.hit(i);
                }

                this.score = 0;
                this.activeMole = -1;
                this.running = true;
                this.speed = 1000;
                this.gameLoop();
                App.showToast("Tap when they pop up!");
            }

            gameLoop() {
                if(!this.running) return;
                // Hide prev
                if(this.activeMole !== -1) {
                    const el = document.getElementById(`mole-${this.activeMole}`);
                    if(el) el.classList.remove('scale-100');
                    el.classList.add('scale-0');
                }
                
                // Show new
                this.activeMole = Math.floor(Math.random() * 9);
                const mole = document.getElementById(`mole-${this.activeMole}`);
                mole.classList.remove('scale-0');
                mole.classList.add('scale-100');

                this.speed = Math.max(400, this.speed - 20); // Get faster
                
                this.timer = setTimeout(() => this.gameLoop(), this.speed);
                
                // End game after 20 seconds roughly (or just let them fail?) 
                // Let's do a simple max score or time limit.
                if(this.speed < 450 && Math.random() > 0.8) {
                   // Random chance to end if fast enough? No, let's just run until miss?
                   // Simplest: Run for 30 rounds.
                }
            }

            hit(i) {
                if(i === this.activeMole) {
                    this.score += 10;
                    this.onScore(this.score);
                    Sound.playPop();
                    // Instant hide
                    document.getElementById(`mole-${i}`).classList.remove('scale-100');
                    document.getElementById(`mole-${i}`).classList.add('scale-0');
                    this.activeMole = -1;
                    
                    // Floating heart effect could go here
                }
            }
            cleanup() { this.running = false; clearTimeout(this.timer); }
        }

        // NEW GAME: LOVE SYNC (Simon Says)
        class SimonGame {
            constructor(container, onScore) { this.container=container; this.onScore=onScore; }
            start() {
                this.colors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-500'];
                this.container.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        ${this.colors.map((c, i) => `
                            <div id="simon-${i}" onclick="App.game.click(${i})" 
                                 class="w-32 h-32 rounded-2xl ${c} opacity-50 transition-opacity duration-100 cursor-pointer shadow-lg active:scale-95">
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-8 text-center font-bold text-luxury-deep" id="simon-msg">Watch...</div>
                `;
                this.sequence = [];
                this.playerIdx = 0;
                this.score = 0;
                this.inputEnabled = false;
                setTimeout(() => this.nextRound(), 1000);
            }

            nextRound() {
                this.sequence.push(Math.floor(Math.random() * 4));
                this.playerIdx = 0;
                this.inputEnabled = false;
                document.getElementById('simon-msg').innerText = "Watch...";
                this.playSequence(0);
            }

            playSequence(idx) {
                if(idx >= this.sequence.length) {
                    this.inputEnabled = true;
                    document.getElementById('simon-msg').innerText = "Your Turn!";
                    return;
                }
                const padId = this.sequence[idx];
                this.flash(padId);
                setTimeout(() => this.playSequence(idx+1), 600);
            }

            flash(id) {
                const el = document.getElementById(`simon-${id}`);
                el.classList.remove('opacity-50');
                el.classList.add('opacity-100', 'brightness-125');
                Sound.playPop(); // Tonal diff would be better but keeping simple
                setTimeout(() => {
                    el.classList.remove('opacity-100', 'brightness-125');
                    el.classList.add('opacity-50');
                }, 300);
            }

            click(id) {
                if(!this.inputEnabled) return;
                this.flash(id);
                if(id === this.sequence[this.playerIdx]) {
                    this.playerIdx++;
                    if(this.playerIdx >= this.sequence.length) {
                        this.score += 10 * this.sequence.length;
                        this.onScore(this.score);
                        this.inputEnabled = false;
                        document.getElementById('simon-msg').innerText = "Perfect!";
                        setTimeout(() => this.nextRound(), 1000);
                    }
                } else {
                    Sound.playError();
                    App.endGame(this.score);
                }
            }
            cleanup(){}
        }

        // --- 4. APP CONTROLLER ---
        const App = {
            game: null, currentId: null,
            init: () => {
                preloadImages();
                Sound.init();
                App.showMenu();
                
                document.getElementById('btn-sound').onclick = () => {
                    const m = Sound.toggle();
                    document.getElementById('btn-sound').innerHTML = m ? '<i class="ph-fill ph-speaker-slash text-gray-400"></i>' : '<i class="ph-fill ph-speaker-high"></i>';
                };
                document.getElementById('btn-menu-back').onclick = App.showMenu;
                document.getElementById('btn-restart').onclick = () => App.loadGame(App.currentId);
                document.getElementById('btn-settings').onclick = App.showMenu;
            },
            showMenu: () => {
                if(App.game) App.game.cleanup();
                document.getElementById('view-menu').classList.remove('hidden');
                document.getElementById('view-game').classList.add('hidden');
                document.getElementById('view-game').classList.remove('flex');
                document.getElementById('btn-menu-back').classList.add('hidden');
            },
            loadGame: (id) => {
                App.currentId = id;
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-game').classList.remove('hidden');
                document.getElementById('view-game').classList.add('flex');
                document.getElementById('btn-menu-back').classList.remove('hidden');
                
                const stage = document.getElementById('game-stage');
                const updateScore = (s) => document.getElementById('game-score-value').innerText = s;
                
                // Clear stage
                stage.innerHTML = '';

                if(id==='snake') App.game = new SnakeGame(stage, updateScore);
                else if(id==='ttt') App.game = new TTTGame(stage, updateScore);
                else if(id==='scramble') App.game = new ScrambleGame(stage, updateScore);
                else if(id==='memory') App.game = new MemoryGame(stage, updateScore);
                else if(id==='kiss') App.game = new KissGame(stage, updateScore);
                else if(id==='simon') App.game = new SimonGame(stage, updateScore);
                
                if(App.game) App.game.start();
            },
            endGame: (score) => {
                const isBest = Storage.set(App.currentId, score);
                document.getElementById('modal-score').innerText = score;
                document.getElementById('modal-best').innerText = Storage.get(App.currentId);
                document.getElementById('modal-title').innerText = isBest ? "New Record!" : "Game Over";
                
                const m = document.getElementById('modal-overlay');
                m.classList.remove('hidden');
                requestAnimationFrame(() => { m.classList.remove('opacity-0'); document.getElementById('modal-content').classList.remove('scale-95'); });
                
                document.getElementById('modal-action').onclick = () => { App.closeModal(); App.loadGame(App.currentId); };
                if(isBest || score>50) { Sound.playWin(); confetti({particleCount:100, spread:70, origin:{y:0.6}}); }
            },
            closeModal: () => {
                const m = document.getElementById('modal-overlay');
                m.classList.add('opacity-0'); document.getElementById('modal-content').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            },
            showToast: (msg) => {
                const t = document.getElementById('toast');
                document.getElementById('toast-msg').innerText = msg;
                t.classList.remove('translate-y-[-150%]', 'opacity-0');
                setTimeout(()=>t.classList.add('translate-y-[-150%]', 'opacity-0'), 2500);
            }
        };

        window.onload = App.init;

    </script>
</body>
