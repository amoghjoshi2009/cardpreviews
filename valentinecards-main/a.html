<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; }
        
        .floating-heart {
            position: absolute;
            color: #ffb6c1;
            animation: float 6s linear infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-pink-50 h-[100dvh] overflow-hidden flex flex-col items-center justify-center relative select-none">

    <div id="hearts-container" class="absolute inset-0 pointer-events-none"></div>

    <div id="card" class="z-10 text-center p-6 max-w-lg w-full">
        <img id="mascot" src="https://media.tenor.com/K2s46_5Y9eYAAAAi/mochi-peach.gif" 
             alt="Cute Bear" 
             class="w-32 h-32 md:w-48 md:h-48 mx-auto mb-6 object-contain transition-transform duration-300 hover:scale-110 drop-shadow-xl">
        
        <h1 class="text-3xl md:text-5xl font-black text-pink-600 mb-8 drop-shadow-sm leading-tight">
            Will you be my Valentine? 🌹
        </h1>

        <div class="flex flex-wrap justify-center items-center gap-4 min-h-[100px]">
            <button id="yes-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-[0_4px_0_rgb(21,128,61)] active:shadow-none active:translate-y-[4px] transition-all duration-200 text-xl z-20 touch-manipulation">
                YES! ❤️
            </button>
            <button id="no-btn" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-8 rounded-full shadow-[0_4px_0_rgb(190,18,60)] active:shadow-none active:translate-y-[4px] transition-all duration-200 text-xl z-10 touch-manipulation">
                No
            </button>
        </div>
    </div>

    <div id="success" class="fixed inset-0 bg-pink-500/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <h1 class="text-5xl md:text-8xl font-black text-white mb-8 animate-bounce text-center">YAY!!! 🎉</h1>
        <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" class="rounded-3xl shadow-2xl w-64 border-4 border-white object-cover">
        <p class="text-white text-2xl mt-8 font-bold text-center px-4">Best. Date. Ever.</p>
    </div>

    <script>
        // Logic
        const phrases = ["No", "Are you sure?", "Really sure?", "Pookie please?", "Don't do this!", "I'm gonna cry...", "You're breaking my heart!", "Last chance!"];
        let noCount = 0;
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mascot = document.getElementById('mascot');
        const container = document.getElementById('hearts-container');

        // Create background hearts
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }, 300);

        noBtn.addEventListener('click', () => {
            noCount++;
            
            // Text Change
            noBtn.innerText = phrases[Math.min(noCount, phrases.length - 1)];
            
            // Visual Change
            mascot.src = "https://media.tenor.com/fMGqSA8rRiwAAAAi/cute-sad.gif"; // Sad gif
            mascot.classList.add('shake');
            setTimeout(() => mascot.classList.remove('shake'), 500);

            // Growth Logic
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            // Multiplier remains 1.5, flexbox handles the layout
            const newSize = currentSize * 1.5;
            yesBtn.style.fontSize = `${newSize}px`;
            yesBtn.style.padding = `${newSize * 0.5}px ${newSize}px`;
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('success').classList.remove('hidden');
            setTimeout(() => document.getElementById('success').classList.remove('opacity-0'), 10);
        });
    </script>
</body>
</html>
