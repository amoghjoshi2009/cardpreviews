<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Sunset Glow</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600&family=Playfair+Display:wght@600&family=Indie+Flower&family=Press+Start+2P&family=Bungee&family=UnifrakturMaguntia&family=Special+Elite&family=Orbitron&family=Cinzel&family=Comic+Neue&family=Fira+Code&family=Passion+One&family=Montserrat&family=Chomsky&display=swap');

:root {
    --primary: #fff3e0; 
    --accent: #ef6c00;
    --glass: rgba(255, 255, 255, 0.8);
    --text-main: #4e342e;
    --btn-text: white;
    --frame-bg: #fff8e1;
}

body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
    color: var(--text-main);
    margin: 0;
    width: 100%; height: 100dvh; 
    overflow: hidden; 
    display: flex; align-items: center; justify-content: center;
}

.bg-animation {
    position: absolute; inset: 0; z-index: -1;
    background: linear-gradient(45deg, #ee0979, #ff6a00);
    opacity: 0.2;
}

.page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none;
    transition: all 0.5s ease;
}
.page.active { opacity: 1; pointer-events: auto; }


.page { opacity: 0; transform: translateX(-100%); transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.page.active { opacity: 1; transform: translateX(0); }


.card {
    background: var(--glass);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border-radius: 30px; padding: 40px;
    width: 100%; max-width: 450px;
    text-align: center; border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

.theme-font { font-family: 'Orbitron', sans-serif; color: var(--accent); line-height: 1.2; }

.frame {
    background: var(--frame-bg); padding: 10px;
    border-radius: 15px; transform: rotate(-2deg);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin: 20px 0;
}
img { width: 100%; border-radius: 10px; display: block; }

.nav-btn {
    position: fixed; bottom: 30px;
    background: var(--accent); color: var(--btn-text);
    border: none; padding: 15px 30px; border-radius: 50px;
    font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
    <div class="bg-animation"></div>
    
            <div class="page active">
                <div class="card">
                    <h1 class="theme-font" style="font-size: 2.5rem;">Sunset Glow</h1>
                    <div class="frame"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600"></div>
                    <p style="font-size: 1.2rem;">Have an amazing day filled with joy! 🚀</p>
                    <small style="opacity: 0.5;">Font: Sci-Fi | Transition: Elastic</small>
                </div>
            </div>
            <div class="page ">
                <div class="card">
                    <h1 class="theme-font" style="font-size: 2.5rem;">Sunset Glow</h1>
                    <div class="frame"><img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=600"></div>
                    <p style="font-size: 1.2rem;">Happy Birthday! You're the best! 🎉</p>
                    <small style="opacity: 0.5;">Font: Sci-Fi | Transition: Elastic</small>
                </div>
            </div>
            <div class="page ">
                <div class="card">
                    <h1 class="theme-font" style="font-size: 2.5rem;">Sunset Glow</h1>
                    <div class="frame"><img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=600"></div>
                    <p style="font-size: 1.2rem;">Happy Birthday! You're the best! 🎉</p>
                    <small style="opacity: 0.5;">Font: Sci-Fi | Transition: Elastic</small>
                </div>
            </div>
    <button class="nav-btn" onclick="nextPage()">Next Slide →</button>

    <script>
        let current = 0;
        const pages = document.querySelectorAll('.page');
        function nextPage() {
            pages[current].classList.remove('active');
            current = (current + 1) % pages.length;
            pages[current].classList.add('active');
        }
    </script>
</body>
</html>
